
server:
  port: 8088

spring:
  cloud:
    gateway:
      routes:

        - id: OrderService
          uri: lb://OrderService
          predicates:
            - Path=/orders/**

        - id: PaymentService
          uri: lb://PaymentService
          predicates:
            - Path=/payments/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
